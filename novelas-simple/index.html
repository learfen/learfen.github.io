<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<link rel="stylesheet" href="./recursos/css/bootstrap.min.css">
	<link rel="stylesheet" href="./recursos/css/index.css">
	<link rel="stylesheet" href="./recursos/css/animate.min.css">
</head>
<body>
	<div id="info" class="p-2 bg-primary oculto">
		<span>Puntos: <b id="puntos">0</b></span>
		<button id="botonMostrarMenu" class="btn btn-primary">Mostrar menu</button>
	</div>
	<div id="inicio" class="w-100 vh-100 d-flex justify-content-center align-items-center">
		<div class="vw-25">
			<h3>Juego de trivia</h3>
			<button class="btn btn-primary w-100" id="botonIniciar">Iniciar</button>
		</div>
	</div>
	<div id="menu" class="oculto animate__animated animate__fadeIn">
		<h3>Soy el menu</h3>
		<div class="d-flex justify-content-center align-items-center flex-column">
			<button class="btn">Reiniciar</button>
		</div>
	</div>
	<div id="game" class="position-absolute w-100 vh-100 start-0 top-0">
		<img id="taza1" class="position-absolute" src="./images/taza-cafe.png" width="200" height="auto" alt="">
		<img id="taza2" class="position-absolute" src="./images/taza-cafe.png" width="200" height="auto" alt="">
		<img id="taza3" class="position-absolute" src="./images/taza-cafe.png" width="200" height="auto" alt="">
		<img id="taza4" class="position-absolute" src="./images/taza-cafe.png" width="200" height="auto" alt="">
		<img id="mesa" src="./images/mesa.jpg" width="500" height="auto" alt="">
	</div>
	<div class="position-fixed bottom-0 start-0" id="coordenadas"></div>
</body>
<script src="./recursos/bootstrap.bundle.min.js"></script>
<script src="./index.js"></script>
<script src="./componentes/menu.js"></script>
<script src="./componentes/transicion.js"></script>
<script src="./componentes/escena.js"></script>
<script src="./componentes/personaje.js"></script>
<script src="./componentes/juego.js"></script>
</html>
