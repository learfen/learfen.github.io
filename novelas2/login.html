	<title>Login</title>

	<link href="./index.css" rel="stylesheet" />
</head>
<body>
	<div id="app" class="text-center">
		
		<error-view></error-view>
		<div class="container">
			<div class="row">
				<div class="col-12 d-flex flex-wrap">
					<v-modal class="m-1" text-button="Nuevo preceptor">
						<janitor-register-by-ocr />
					</v-modal>
				</div>
			</div>
			<div class="row">
				<div class="col-md-6 mx-auto">
					<form class="form-signin" @submit.prevent="login">
						<img class="mb-4" src="https://getbootstrap.com/docs/4.3/assets/brand/bootstrap-solid.svg" alt="" width="72" height="72">
						<h1 class="h3 mb-3 font-weight-normal">Please sign in</h1>
						<label for="inputEmail" class="sr-only">Correo</label>
						<input type="email" v-model="email" class="form-control" placeholder="Email address" required autofocus="">
						<label for="inputPassword" class="sr-only">Contraseña</label>
						<input type="password" v-model="password" class="form-control" placeholder="Password" required>
						<div v-if="passwordValidation" class="alert alert-danger" role="alert">
							{{passwordValidation}}
						</div>
						<button class="btn btn-lg btn-primary btn-block" type="submit">Sign in</button>
						<p class="mt-5 mb-3 text-muted">© 2017-2019</p>
					</form>
				</div>
			</div>
		</div>
	</div>
	
</body>
